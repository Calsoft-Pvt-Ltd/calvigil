rules:
  # ─── Go Security Rules ──────────────────────────────────────────
  - id: go-unsafe-pointer
    pattern: unsafe.Pointer(...)
    message: >
      Use of unsafe.Pointer can bypass Go's type safety and memory safety guarantees.
      Avoid unless absolutely necessary.
    severity: WARNING
    languages: [go]
    metadata:
      cwe: ["CWE-704"]
      category: memory-safety

  - id: go-http-no-timeout
    pattern: |
      &http.Server{...}
    pattern-not: |
      &http.Server{..., ReadTimeout: ..., ...}
    message: >
      HTTP server created without read timeout. This may lead to slowloris DoS attacks.
      Set ReadTimeout, WriteTimeout, and IdleTimeout.
    severity: WARNING
    languages: [go]
    metadata:
      cwe: ["CWE-400"]
      category: denial-of-service

  - id: go-defer-in-loop
    pattern: |
      for ... {
        ...
        defer $FN(...)
        ...
      }
    message: >
      defer inside a loop won't execute until the function returns, not at loop iteration end.
      This can lead to resource leaks.
    severity: WARNING
    languages: [go]
    metadata:
      cwe: ["CWE-404"]
      category: resource-leak

  # ─── Python Security Rules ──────────────────────────────────────
  - id: python-flask-debug
    pattern: |
      app.run(..., debug=True, ...)
    message: >
      Flask debug mode enabled. This exposes the Werkzeug debugger which allows
      arbitrary code execution. Disable in production.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: ["CWE-489"]
      owasp: ["A05:2021 - Security Misconfiguration"]
      category: security-misconfiguration

  - id: python-hardcoded-bind-all
    pattern-either:
      - pattern: app.run(host="0.0.0.0", ...)
      - pattern: app.run(host='0.0.0.0', ...)
    message: >
      Application binds to all network interfaces (0.0.0.0).
      In production, bind to a specific interface or use a reverse proxy.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: ["CWE-668"]
      category: security-misconfiguration

  - id: python-assert-auth
    pattern: |
      assert $CONDITION
    message: >
      Using assert for security checks. Assertions are stripped in optimized bytecode (-O flag).
      Use proper if/raise statements for security logic.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: ["CWE-617"]
      category: improper-validation

  # ─── Node.js/JavaScript Security Rules ──────────────────────────
  - id: js-eval-usage
    pattern-either:
      - pattern: eval($INPUT)
      - pattern: new Function($INPUT)
    message: >
      Use of eval() or new Function() with dynamic input enables code injection.
      Use safer alternatives like JSON.parse() for data parsing.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: ["CWE-95"]
      owasp: ["A03:2021 - Injection"]
      category: code-injection

  - id: js-cors-wildcard
    pattern: |
      cors({origin: "*", ...})
    message: >
      CORS configuration allows all origins. Restrict to specific trusted domains.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: ["CWE-942"]
      owasp: ["A05:2021 - Security Misconfiguration"]
      category: cors-misconfiguration

  - id: js-jwt-no-verify
    pattern: |
      jwt.decode($TOKEN)
    message: >
      JWT decoded without verification. Use jwt.verify() to validate signature.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: ["CWE-345"]
      owasp: ["A02:2021 - Cryptographic Failures"]
      category: broken-authentication

  # ─── Java Security Rules ────────────────────────────────────────
  - id: java-xxe-parser
    pattern: |
      DocumentBuilderFactory.newInstance()
    message: >
      XML parser created without disabling external entities. Configure the parser
      to prevent XXE attacks: setFeature("http://xml.org/sax/features/external-general-entities", false)
    severity: WARNING
    languages: [java]
    metadata:
      cwe: ["CWE-611"]
      owasp: ["A05:2021 - Security Misconfiguration"]
      category: xxe

  - id: java-crypto-ecb-mode
    pattern: |
      Cipher.getInstance("AES/ECB/...")
    message: >
      AES in ECB mode does not provide semantic security. Use AES/GCM/NoPadding instead.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: ["CWE-327"]
      owasp: ["A02:2021 - Cryptographic Failures"]
      category: weak-crypto

  # ─── SonarQube-aligned language-specific rules ──────────────────

  # Go: HTTP server without timeouts (SonarQube equivalent / CWE-400)
  - id: go-http-write-timeout
    pattern: |
      &http.Server{...}
    pattern-not: |
      &http.Server{..., WriteTimeout: ..., ...}
    message: >
      HTTP server created without WriteTimeout. This may lead to resource
      exhaustion. Set ReadTimeout, WriteTimeout, and IdleTimeout.
    severity: WARNING
    languages: [go]
    metadata:
      cwe: ["CWE-400"]
      category: denial-of-service

  # Go: SQL query with db.Query and string concat (S2077)
  - id: go-sql-query-concat
    pattern-either:
      - pattern: $DB.Query("..." + $INPUT)
      - pattern: $DB.QueryRow("..." + $INPUT)
      - pattern: $DB.Exec("..." + $INPUT)
      - pattern: $DB.QueryContext($CTX, "..." + $INPUT)
    message: >
      SQL query built with string concatenation. Use parameterized queries
      with $DB.Query("... $1", input) instead.
    severity: ERROR
    languages: [go]
    metadata:
      cwe: ["CWE-89"]
      owasp: ["A03:2021 - Injection"]
      category: sql-injection

  # Python: Django raw SQL (S2077)
  - id: python-django-raw-sql
    pattern-either:
      - pattern: $MODEL.objects.raw("..." + $INPUT)
      - pattern: $MODEL.objects.raw(f"...{$INPUT}...")
      - pattern: connection.cursor().execute("..." + $INPUT)
    message: >
      Django raw SQL with string concatenation. Use parameterized queries
      with %s placeholders and params tuple.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: ["CWE-89"]
      owasp: ["A03:2021 - Injection"]
      category: sql-injection

  # Python: Insecure temp file (S5443 / CWE-377)
  - id: python-insecure-tempfile
    pattern-either:
      - pattern: tempfile.mktemp(...)
    message: >
      tempfile.mktemp() is insecure (race condition). Use
      tempfile.mkstemp() or tempfile.NamedTemporaryFile() instead.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: ["CWE-377"]
      category: insecure-temp-file

  # Java: Weak cipher algorithms (S5547)
  - id: java-weak-cipher
    pattern-either:
      - pattern: Cipher.getInstance("DES")
      - pattern: Cipher.getInstance("DESede")
      - pattern: Cipher.getInstance("RC4")
      - pattern: Cipher.getInstance("Blowfish")
      - pattern: Cipher.getInstance("RC2")
    message: >
      Weak cipher algorithm (DES/3DES/RC4/Blowfish/RC2). Use AES/GCM/NoPadding
      with a 256-bit key.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: ["CWE-327"]
      owasp: ["A02:2021 - Cryptographic Failures"]
      category: weak-cipher

  # Java: Insufficient RSA key size (S4426 / CWE-326)
  - id: java-short-rsa-key
    pattern: |
      KeyPairGenerator.getInstance("RSA")
    message: >
      RSA key generator instantiated. Ensure key size is at least 2048 bits.
      Keys shorter than 2048 bits are considered insecure.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: ["CWE-326"]
      owasp: ["A02:2021 - Cryptographic Failures"]
      category: insufficient-key-size

  # Node.js: Prototype pollution (CWE-1321)
  - id: js-prototype-pollution
    pattern-either:
      - pattern: $OBJ["__proto__"]
      - pattern: $OBJ.__proto__ = ...
      - pattern: Object.assign({}, ..., $INPUT)
    message: >
      Potential prototype pollution. Validate object keys and avoid
      merging untrusted input into objects without sanitization.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: ["CWE-1321"]
      category: prototype-pollution

  # Python: assert used for security (S5905 / CWE-617)
  - id: python-assert-security
    pattern-either:
      - pattern: |
          assert $USER.is_authenticated
      - pattern: |
          assert $USER.is_admin
      - pattern: |
          assert $PERM
    message: >
      assert used for access control. Assertions are stripped with -O flag.
      Use if/raise for security checks.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: ["CWE-617"]
      category: improper-validation

  # Go: errors.New with string concat (logging/error context)
  - id: go-error-wrap-concat
    pattern-either:
      - pattern: errors.New("..." + $VAR)
      - pattern: fmt.Errorf("..." + $VAR)
    message: >
      Error message built with string concatenation. Use fmt.Errorf with
      %w verb for proper error wrapping.
    severity: INFO
    languages: [go]
    metadata:
      cwe: ["CWE-209"]
      category: error-handling
