name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── macOS builds (native runner for code signing) ─────────────────────────
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: darwin-amd64
          - goarch: arm64
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-X github.com/Calsoft-Pvt-Ltd/calvigil/cmd.version=${VERSION}"
          mkdir -p dist
          go build -ldflags "${LDFLAGS}" -trimpath -o dist/calvigil .

      - name: Sign binary
        # Requires secrets: APPLE_CERT_BASE64, APPLE_CERT_PASSWORD, APPLE_SIGNING_IDENTITY
        if: ${{ secrets.APPLE_CERT_BASE64 != '' }}
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          # Create a temporary keychain and import the Developer ID cert
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Sign with hardened runtime (required for notarization)
          codesign --sign "$APPLE_SIGNING_IDENTITY" \
                   --options runtime \
                   --timestamp \
                   --force \
                   dist/calvigil

          codesign --verify --verbose dist/calvigil

      - name: Notarize binary
        # Requires secrets: APPLE_ID, APPLE_APP_PASSWORD, APPLE_TEAM_ID
        if: ${{ secrets.APPLE_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Notarization requires a zip — cannot staple to a plain binary
          cd dist && zip calvigil-notarize.zip calvigil
          xcrun notarytool submit calvigil-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm calvigil-notarize.zip

      - name: Package tarball
        run: |
          cd dist
          tar czf calvigil-${GITHUB_REF_NAME}-${{ matrix.suffix }}.tar.gz calvigil
          rm calvigil

      - uses: actions/upload-artifact@v4
        with:
          name: calvigil-${{ matrix.suffix }}
          path: dist/*

  # ── Windows + Linux builds ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Windows
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64
            ext: .exe
          # Linux (for tarballs + packaging)
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-X github.com/Calsoft-Pvt-Ltd/calvigil/cmd.version=${VERSION}"
          mkdir -p dist
          go build -ldflags "${LDFLAGS}" -trimpath -o dist/calvigil${{ matrix.ext }} .

      - name: Package tarball (Linux)
        if: matrix.goos == 'linux'
        run: |
          cd dist
          tar czf calvigil-${GITHUB_REF_NAME}-${{ matrix.suffix }}.tar.gz calvigil
          rm calvigil

      - name: Package zip (Windows)
        if: matrix.goos == 'windows'
        run: |
          cd dist
          zip calvigil-${GITHUB_REF_NAME}-${{ matrix.suffix }}.zip calvigil.exe
          rm calvigil.exe

      - uses: actions/upload-artifact@v4
        with:
          name: calvigil-${{ matrix.suffix }}
          path: dist/*

  package-deb:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            deb_arch: amd64
          - goarch: arm64
            deb_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-X github.com/Calsoft-Pvt-Ltd/calvigil/cmd.version=${VERSION}"
          go build -ldflags "${LDFLAGS}" -trimpath -o calvigil .

      - name: Build .deb package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKG_DIR=calvigil_${VERSION}_${{ matrix.deb_arch }}
          mkdir -p ${PKG_DIR}/DEBIAN
          mkdir -p ${PKG_DIR}/usr/bin

          cp calvigil ${PKG_DIR}/usr/bin/calvigil
          chmod 755 ${PKG_DIR}/usr/bin/calvigil

          cat > ${PKG_DIR}/DEBIAN/control <<EOF
          Package: calvigil
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: Calsoft Pvt Ltd <info@calsoftinc.com>
          Description: AI-powered vulnerability scanner for Go, Java, Python & Node.js projects
           Calvigil scans project dependencies against CVE databases (OSV, NVD, GitHub Advisory),
           performs AI-powered code analysis, and runs Semgrep SAST with bundled security rules.
          EOF
          # Remove leading spaces from heredoc (dpkg-deb requires no leading whitespace in fields)
          sed -i 's/^          //' ${PKG_DIR}/DEBIAN/control

          mkdir -p dist
          dpkg-deb --build --root-owner-group ${PKG_DIR}
          mv ${PKG_DIR}.deb dist/
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: calvigil-deb-${{ matrix.deb_arch }}
          path: dist/*.deb

  package-rpm:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            rpm_arch: x86_64
          - goarch: arm64
            rpm_arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install RPM tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-X github.com/Calsoft-Pvt-Ltd/calvigil/cmd.version=${VERSION}"
          go build -ldflags "${LDFLAGS}" -trimpath -o calvigil .

      - name: Build .rpm package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TOPDIR=$(pwd)/rpmbuild
          mkdir -p ${TOPDIR}/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Place binary where rpmbuild can find it
          mkdir -p ${TOPDIR}/SOURCES
          cp calvigil ${TOPDIR}/SOURCES/calvigil

          cat > ${TOPDIR}/SPECS/calvigil.spec <<'SPEC'
          Name:           calvigil
          Version:        %{_version}
          Release:        1
          Summary:        AI-powered vulnerability scanner for Go, Java, Python & Node.js
          License:        Apache-2.0
          URL:            https://github.com/Calsoft-Pvt-Ltd/calvigil

          # Disable debug package and binary stripping — binary is cross-compiled
          %global debug_package %{nil}
          %define __strip /bin/true
          %define __os_install_post %{nil}

          %description
          Calvigil scans project dependencies against CVE databases (OSV, NVD, GitHub Advisory),
          performs AI-powered code analysis, and runs Semgrep SAST with bundled security rules.

          %install
          mkdir -p %{buildroot}/usr/bin
          cp %{_sourcedir}/calvigil %{buildroot}/usr/bin/calvigil
          chmod 755 %{buildroot}/usr/bin/calvigil

          %files
          /usr/bin/calvigil
          SPEC
          sed -i 's/^          //' ${TOPDIR}/SPECS/calvigil.spec

          rpmbuild --define "_topdir ${TOPDIR}" \
                   --define "_version ${VERSION}" \
                   --target ${{ matrix.rpm_arch }} \
                   -bb ${TOPDIR}/SPECS/calvigil.spec

          mkdir -p dist
          find ${TOPDIR}/RPMS -name '*.rpm' -exec cp {} dist/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: calvigil-rpm-${{ matrix.rpm_arch }}
          path: dist/*.rpm

  release:
    needs: [build-mac, build, package-deb, package-rpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
